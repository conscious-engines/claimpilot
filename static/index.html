<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimPilot — AI Claims Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top Banner -->
<div class="top-banner">
  <div class="brand">
    <div class="brand-icon">C</div>
    ClaimPilot
    <span class="brand-sub">by Equifi</span>
  </div>
  <div class="role-switcher" id="roleSwitcher">
    <button class="role-btn active" data-role="claimant">Claimant</button>
    <button class="role-btn" data-role="operations">Operations</button>
    <button class="role-btn" data-role="management">Management</button>
  </div>
  <div class="banner-right">
    <span class="powered-by">POC v0.1</span>
  </div>
</div>

<!-- Split View (default for Claimant role) -->
<div class="split-view active" id="splitView">
  <div class="split-panel-left" id="splitPanelLeft">
    <!-- Chat Container -->
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-avatar">CP</div>
        <div class="chat-header-info">
          <h3>ClaimPilot Assistant</h3>
          <p id="chatClaimInfo">Loading...</p>
        </div>
      </div>
      <div class="claim-tabs" id="claimTabs"></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
        <button id="chatImage" class="icon-btn" title="Upload photos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        </button>
        <button id="chatMic" class="icon-btn" title="Record voice note">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </button>
        <button id="chatSend">Send</button>
        <input type="file" id="imageInput" accept="image/*" multiple hidden>
      </div>
    </div>
  </div>
  <div class="split-panel-right" id="splitPanelRight">
    <!-- Ops panel rendered by JS -->
  </div>
</div>

<!-- Operations View (full-width) -->
<div class="view" id="view-operations">
  <div class="ops-container">
    <h2>Operations Dashboard</h2>
    <p class="ops-subtitle">Active claims and system integrations</p>
    <div class="claims-grid" id="claimsGrid"></div>
    <div class="timeline-section">
      <h3>Integration Activity Log</h3>
      <div class="timeline-list" id="timelineList"></div>
    </div>
  </div>
</div>

<!-- Management View -->
<div class="view" id="view-management">
  <div class="mgmt-container">
    <h2>Management Metrics</h2>
    <p class="mgmt-subtitle">Portfolio overview and agent performance</p>
    <div class="metrics-grid" id="metricsGrid"></div>
    <div class="status-breakdown" id="statusBreakdown"></div>
    <div class="decisions-section">
      <h3>Agent Decisions Log</h3>
      <div class="decisions-list" id="decisionsList"></div>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
